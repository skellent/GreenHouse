<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Skell's GreenHouse</title>
    <link rel="stylesheet" href="./styles/index.css">
    <script src="./scripts/index.js" defer></script>
</head>
<body>
    <header>
        <span>Skell's GreenHouse</span>
        <button id="open-credits" class="icon-btn">
            <svg viewBox="0 0 24 24"><path d="M11 7h2v2h-2zm0 4h2v6h-2zm1-9C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
        </button>
    </header>

    <div class="global-container">
        <div class="row">
            <div class="card" id="humedad-tierra">
                <div class="label">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M12 2c-5.33 4.55-8 8.48-8 11.8 0 4.98 3.8 8.2 8 8.2s8-3.22 8-8.2c0-3.32-2.67-7.25-8-11.8zM7.83 14c.37-2.45 2.15-4.77 4.17-6.51.19-.16.48-.11.6.12.12.23.07.52-.12.68-1.74 1.46-3.33 3.49-3.66 5.71-.05.31-.34.5-.64.44-.28-.05-.48-.28-.48-.54z"/></svg>
                    Hum. Tierra
                </div>
                <div class="val-container">
                    <span class="value" id="humedad-tierra-value">--</span>
                    <span class="unit">%</span>
                </div>
            </div>
            <div class="card" id="temperatura-ambiente">
                <div class="label">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M15 13V5c0-1.66-1.34-3-3-3S9 3.34 9 5v8c-1.21.91-2 2.37-2 4 0 2.76 2.24 5 5 5s5-2.24 5-5c0-1.63-.79-3.09-2-4zm-4-2V5c0-.55.45-1 1-1s1 .45 1 1v6h-2z"/></svg>
                    Temp. Aire
                </div>
                <div class="val-container">
                    <span class="value" id="temperatura-ambiente-value">--</span>
                    <span class="unit">°C</span>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="card" id="tanque">
                <div class="label">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M19 2H5c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 16H7v-2h10v2zm0-4H7v-2h10v2zm0-4H7V8h10v2z"/></svg>
                    Tanque
                </div>
                <div class="val-container">
                    <span class="value" id="tanque-value">--</span>
                    <span class="unit">%</span>
                </div>
            </div>
            <div class="card" id="altura-planta">
                <div class="label">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M2 22h20V2L2 22zm16-3.17L14.83 16H18v2.83zM18 13h-3.17L12.17 10H18v3zM9.5 7.33L8.17 6H18v1.33H9.5z"/></svg>
                    Altura
                </div>
                <div class="val-container">
                    <span class="value" id="altura-planta-value">--</span>
                    <span class="unit">CM</span>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="card" id="uv">
                <div class="label">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M6.76 4.84l-1.8-1.79-1.41 1.41 1.79 1.79 1.42-1.41zM4 10.5H1v2h3v-2zm9-9.5h-2v3h2V1zm7.45 3.91l-1.41-1.41-1.79 1.79 1.41 1.41 1.79-1.79zm-3.21 13.75l1.79 1.8 1.41-1.41-1.8-1.79-1.4 1.4zM20 10.5v2h3v-2h-3zm-8-5c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm0 10c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4zm-7.05 1.84l-1.79 1.79 1.41 1.41 1.79-1.8-1.41-1.4zm9.05 4.66h-2v3h2v-3z"/></svg>
                    Intensidad UV
                </div>
                <div class="val-container">
                    <span class="value" id="uv-value">--</span>
                    <span class="unit">%</span>
                </div>
            </div>
            <div class="card" id="bomba">
                <div class="label">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                    Bomba
                </div>
                <div class="val-container">
                    <span class="value" id="bomba-value">--</span>
                </div>
            </div>
        </div>

        <div class="row">
            <button class="action-btn" id="obturador">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>
                FOTOGRAFÍA
            </button> 
        </div>
    </div>

    <div id="credits-modal" class="modal hidden">
        <div class="modal-card">
            <h2>Skell's GreenHouse V2.0</h2>
            <div class="separator"></div>
            <p class="role">Desarrolladores:</p>
            <ul>
                <li>Robert Rodríguez "Skellent"</li>
                <li>Christopher Ramírez</li>
                <li>Fabiana Hernández</li>
            </ul>
            <button id="close-credits" class="action-btn close">CERRAR</button>
        </div>
    </div>
    
    <div id="display-foto" class="modal hidden">
        <div class="modal-card full-w">
            <img id="foto" src="" alt="Cámara">
            <div class="row mt-10">
                <button class="action-btn download" id="descargar-foto">DESCARGAR</button>
                <button class="action-btn close" id="cerrar-foto">CERRAR</button>
            </div>
        </div>
    </div>
</body>
</html>
